name: Auto-Fix Code Style

on: [push, pull_request]

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          # Required if you want to push commits back to the repo
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Change to '3.10', '3.12', etc., depending on your project
          cache: ''

      - name: Get dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff Fixes
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --fix"

      - name: Run Ruff Formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: "format"

      # Commits the changes back to your branch only if files were modified
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated ruff fixes and formatting"
